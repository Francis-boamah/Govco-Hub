<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GOVCO Hub — Checkout</title>
  <link rel="stylesheet" href="css/checkout.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <button id="backBtn" class="icon-btn">←</button>
      <div class="title">Checkout</div>
      <div class="right-top">
        <button id="accountBtn" class="icon-btn">Account</button>
      </div>
    </div>
    <div class="header-bottom">
      <input placeholder="Delivery notes (optional)" id="notes"/>
      <button id="applyNotes">Apply</button>
    </div>
  </header>

  <main class="main">
    <section>
      <h2>Your Order</h2>
      <div id="orderList" class="order-list"></div>
      <div class="totals">
        <div>Subtotal: <span id="subtotal">GHS 0.00</span></div>
        <div>Total: <strong id="total">GHS 0.00</strong></div>
      </div>
    </section>

    <section>
      <h2>Your Info</h2>
      <form id="checkoutForm" class="checkout-form">
        <input id="name" placeholder="Name" required />
        <input id="phone" placeholder="Phone" required />
        <input id="email" placeholder="Email" required />
        <input id="house" placeholder="House name" />
        <input id="room" placeholder="Room number" />
        <button type="submit" id="submitOrder">Submit Order</button>
      </form>
    </section>
  </main>

  <!-- Firebase & Authentication -->
  <script type="module" src="js/firebase-config.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/checkout.js"></script>
</body>
</html>
