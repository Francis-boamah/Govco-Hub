<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GOVCO Hub — Home</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <button id="hamburger" class="icon-btn" aria-label="menu">☰</button>
      <div class="title">GOVCO Hub</div>
      <div class="account-wrap">
        <button id="accountBtn" class="icon-btn">Account</button>
        <span id="cartCounter" class="cart-bubble" style="display:none">0</span>
      </div>
    </div>
    <div class="header-bottom">
      <input id="searchInput" placeholder="Search past questions, products..." />
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <nav id="sidebar" class="sidebar" aria-hidden="true">
  <button id="closeSidebar" class="close-btn" aria-label="Close menu">×</button> <!-- Moved to top and changed to multiplication sign -->
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="past.html">Past questions</a></li>
    <li><a href="quiz.html">Quizzer</a></li>
    <li><a href="store.html">Store</a></li>
  </ul>
</nav>

  <main class="main">
    <section class="welcome">
      <h1>Welcome to GOVCO Hub</h1>
      <p class="short-desc">Your all-in-one student companion for past questions, quizzes, and
          easy shopping right from your room.</p>
    </section>

    <section class="news">
      <h2>Latest News</h2>
      <div id="newsGrid" class="news-grid">
        <!-- JS will insert news containers -->
      </div>
    </section>

    <section class="product-grid-section">
      <h2>Products</h2>
      <div id="productGrid" class="product-grid"></div>
    </section>
  </main>

  <footer class="about">
    <p><strong>NB:</strong> Please sign in before you can access the store.</p>
  </footer>

  <!-- account sign-in modal -->
  <div id="authModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="closeAuth" class="close-btn">×</button>
      <div id="authForms">
        <form id="signInForm" class="auth-form">
          <h3>Sign In</h3>
          <input id="siEmail" type="email" placeholder="Email" required />
          <input id="siPassword" type="password" placeholder="Password" required />
          <button type="submit">Sign In</button>
        </form>

        <form id="signUpForm" class="auth-form">
          <h3>Sign Up</h3>
          <input id="suName" placeholder="Name" required />
          <input id="suHouse" placeholder="House name" required />
          <input id="suRoom" placeholder="Room number" required />
          <input id="suPhone" placeholder="Phone number" required />
          <input id="suEmail" type="email" placeholder="Email" required />
          <input id="suPassword" type="password" placeholder="Password" required />
          <button type="submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Firebase & Authentication -->
  <script type="module" src="js/firebase-config.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/index.js"></script>
</body>
</html>
